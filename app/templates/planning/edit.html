{% extends "base.html" %}{% block title %}编辑规划：{{ student.name }}{% endblock %}{% block content %}<section class="page-heading"><div><p class="eyebrow">创建新版本</p><h1>{{ document["title"] }}</h1><p class="muted">基于 V{{ document["version"] }} 编辑，保存后生成新版本，原版保留不变。</p></div><a class="button secondary" href="{{ url_for('planning.detail', student_id=student.id, document_id=document['id']) }}">取消</a></section>{% if error %}<div class="form-error">{{ error }}</div>{% endif %}<form method="post" class="form-panel"><label><span>标题</span><input name="title" value="{{ document['title'] }}" required></label><label style="display:block;margin-top:16px"><span>规划正文（支持 Markdown 标题和列表）</span><textarea name="content_markdown" rows="30" required>{{ document["content_markdown"] }}</textarea></label><div class="form-actions"><button class="button" type="submit">保存为新版本</button></div></form><style>textarea{width:100%;padding:14px;border:1px solid var(--line);border-radius:8px;font: var(--minimum-readable-font-size) / 1.7 ui-monospace,monospace;resize:vertical}textarea:focus{outline:3px solid rgba(31,111,235,.16);border-color:var(--primary)}</style>{% endblock %}
