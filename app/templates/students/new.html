{% extends "base.html" %}

{% block title %}新增学生 - 学业规划工作台{% endblock %}

{% block content %}
  <section class="page-heading">
    <div>
      <p class="eyebrow">学生档案</p>
      <h1>新增学生</h1>
    </div>
  </section>

  <form class="form-panel" method="post">
    {% if error %}
      <p class="form-error" role="alert">{{ error }}</p>
    {% endif %}
    <div class="form-grid">
      <label>
        <span>姓名</span>
        <input name="name" value="{{ form.get('name', '') }}" required>
      </label>
      <label>
        <span>性别</span>
        <input name="gender" value="{{ form.get('gender', '') }}" required>
      </label>
      <label>
        <span>入学年份</span>
        <input name="enrollment_year" type="number" min="2000" max="2100" value="{{ form.get('enrollment_year', '') }}" required>
      </label>
      <label>
        <span>当前学期</span>
        <input name="current_term" value="{{ form.get('current_term', '') }}" required>
      </label>
      <label>
        <span>学校</span>
        <input name="school" value="{{ form.get('school', '') }}" required>
      </label>
      <label>
        <span>学院</span>
        <input name="college" value="{{ form.get('college', '') }}">
      </label>
      <label>
        <span>专业方向</span>
        <input name="major" value="{{ form.get('major', '') }}" required>
      </label>
      <label>
        <span>城市</span>
        <input name="city" value="{{ form.get('city', '') }}">
      </label>
      <label>
        <span>联系电话</span>
        <input name="phone" type="tel" value="{{ form.get('phone', '') }}">
      </label>
      <label>
        <span>负责老师</span>
        <input name="responsible_teacher" value="{{ form.get('responsible_teacher', '') }}">
      </label>
      <label>
        <span>当前主目标</span>
        <select name="primary_goal" required>
          <option value="">请选择</option>
          <option value="升学" {{ 'selected' if form.get('primary_goal') == '升学' else '' }}>升学</option>
          <option value="就业" {{ 'selected' if form.get('primary_goal') == '就业' else '' }}>就业</option>
        </select>
      </label>
      <label>
        <span>备选方向（可选）</span>
        <select name="alternate_goal">
          <option value="">无</option>
          <option value="升学" {{ 'selected' if form.get('alternate_goal') == '升学' else '' }}>升学</option>
          <option value="就业" {{ 'selected' if form.get('alternate_goal') == '就业' else '' }}>就业</option>
        </select>
      </label>
      <label class="span-2">
        <span>目标确认理由</span>
        <textarea name="decision_reason" rows="3" required>{{ form.get('decision_reason', '') }}</textarea>
      </label>
    </div>
    <div class="form-actions">
      <a class="button secondary" href="{{ url_for('students.list_view') }}">取消</a>
      <button class="button" type="submit">保存学生</button>
    </div>
  </form>
{% endblock %}
