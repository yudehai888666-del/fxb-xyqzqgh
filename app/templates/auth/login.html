<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>登录 - 学业规划工作台</title><link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"></head>
<body><main class="login-page"><section class="login-card"><div class="login-brand">学业规划工作台</div><h1>老师登录</h1><p>登录后仅能查看已授权的学生数据。</p>{% if error %}<div class="form-error">{{ error }}</div>{% endif %}<form method="post"><label><span>用户名</span><input name="username" autocomplete="username" required autofocus></label><label><span>密码</span><input name="password" type="password" autocomplete="current-password" required></label><button class="button" type="submit">安全登录</button></form></section></main><style>.login-page{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(420px,100%);padding:34px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:0 14px 45px rgba(31,41,51,.1)}.login-brand{color:var(--accent);font-weight:800}.login-card h1{margin:8px 0}.login-card>p{margin:0 0 24px;color:var(--muted)}.login-card label{display:block;margin-bottom:16px}.login-card .button{width:100%;margin-top:6px}</style></body></html>
